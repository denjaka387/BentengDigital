<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benteng Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .feature-card { 
            background: #1e293b; border-radius: 12px; padding: 1rem; 
            text-align: center; border: 1px solid #334155; height: 100px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
    </style>
</head>
<body class="p-5">
    <header class="mb-6 text-center">
        <h1 class="text-2xl font-bold text-blue-500 uppercase">🛡️ Benteng Digital</h1>
        <p class="text-xs text-gray-400">Security Suite - Jo Mobile Dev</p>
    </header>
    <div class="grid grid-cols-2 gap-3" id="app-grid">
        <div class="feature-card"><span>🔍</span>APK Scanner</div>
        <div class="feature-card"><span>🔗</span>Link Checker</div>
        <div class="feature-card"><span>🚫</span>Spam Filter</div>
        <div class="feature-card"><span>🔓</span>Root Detect</div>
        <div class="feature-card"><span>🌐</span>Net Monitor</div>
        <div class="feature-card"><span>🖼️</span>Anti Overlay</div>
        <div class="feature-card"><span>💎</span>App Integrity</div>
        <div class="feature-card"><span>⌨️</span>Anti Keylog</div>
        <div class="feature-card"><span>🤖</span>AI Behavior</div>
        <div class="feature-card"><span>🛡️</span>Exploit Shield</div>
        <div class="feature-card"><span>🍯</span>Honeypot</div>
        <div class="feature-card"><span>🔒</span>DNS Protect</div>
        <div class="feature-card"><span>⏪</span>Ransom Back</div>
        <div class="feature-card"><span>📡</span>IMSI Detect</div>
    </div>
</body>
</html>
