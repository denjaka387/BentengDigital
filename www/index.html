<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benteng Digital - Pro Edition</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <style>
        :root { --ion-color-primary: #1a2a6c; }
        .feature-card { height: 100%; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .feature-icon { font-size: 2rem; color: #b21f1f; }
    </style>
</head>
<body>
    <ion-app>
        <ion-header>
            <ion-toolbar color="primary">
                <ion-title>Benteng Digital v2.0</ion-title>
            </ion-toolbar>
        </ion-header>

        <ion-content class="ion-padding">
            <ion-grid>
                <ion-row id="feature-container">
                    </ion-row>
            </ion-grid>
        </ion-content>
    </ion-app>

    <script src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
    <script>
        const features = [
            { t: 'Offline Mapping', i: 'map', d: 'Visualisasi lahan 50ha tanpa internet.' },
            { t: 'Driver Ops Tracker', i: 'car', d: 'Pantau orderan & pengeluaran harian.' },
            { t: 'Drone Flight Log', i: 'airplane', d: 'Logbook baterai & koordinat survey.' },
            { t: 'Taman Laundry POS', i: 'shirt', d: 'Manajemen kasir & stok laundry.' },
            { t: 'Network Scanner', i: 'scan', d: 'Cek keamanan jaringan area survey.' },
            { t: 'Encrypted Vault', i: 'lock-closed', d: 'Simpan data klien dengan enkripsi.' },
            { t: 'Topography Viewer', i: 'layers', d: 'Render data ketinggian tanah (RTK).' },
            { t: 'Order Predictor', i: 'trending-up', d: 'Prediksi jam ramai orderan online.' },
            { t: 'Field Report PDF', i: 'document-text', d: 'Generate laporan survey otomatis.' },
            { t: 'SOS Emergency', i: 'alert-circle', d: 'Kirim lokasi darurat saat di gunung.' },
            { t: 'Inventory Manager', i: 'archive', d: 'Stok sparepart (Toyota Rush/Jeep).' },
            { t: 'Task Scheduler', i: 'calendar', d: 'Jadwal maintenance drone & mobil.' },
            { t: 'Team Sync', i: 'people', d: 'Koordinasi tim (Roni, Yud, Onje).' },
            { t: 'Smart Analytics', i: 'bar-chart', d: 'Grafik keuntungan bisnis & operasional.' }
        ];

        const container = document.getElementById('feature-container');
        features.forEach(f => {
            container.innerHTML += `
                <ion-col size="6" size-md="4">
                    <ion-card class="feature-card ion-text-center">
                        <ion-card-content>
                            <ion-icon name="${f.i}" class="feature-icon"></ion-icon>
                            <ion-card-title style="font-size: 1rem;">${f.t}</ion-card-title>
                            <p style="font-size: 0.8rem;">${f.d}</p>
                        </ion-card-content>
                    </ion-card>
                </ion-col>
            `;
        });
    </script>
</body>
</html>
